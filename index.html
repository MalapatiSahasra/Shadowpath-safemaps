<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShadowPath - Live Navigation</title>
    <!-- Leaflet CSS for map styling -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background: #0a0e1a; overflow: hidden; }
      #root { width: 100%; height: 100%; }
      
      /* Scrollbar styling for the HUD */
      .hud-scrollbar::-webkit-scrollbar { width: 4px; }
      .hud-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
      .hud-scrollbar::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.5); border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
